<!DOCTYPE html>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rock Paper Scissors!</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>
<body>
  <div id="wrapper">
    <h1>ROCK PAPER SCISSORS!</h1>
    <div id="gameWindow">

        <p>Make your move:</p>

          <button id="paperBtn"><img src="resources/paper.png" alt="" class="paperIcon">PAPER</button>
          <button id="scissorsBtn"><img src="resources/scissors.png" alt="" class="scissorsIcon">SCISSORS</button>
        </div>
      </div>

        <p>Computer wins!</p>
      </div>

      <div id="score">
        <p>Your score: 0</p>
        <p>Computer's score: 5</p>
