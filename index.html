<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rock Paper Scissors!</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>
<body>
  <div id="wrapper">
    <h1>ROCK PAPER SCISSORS!</h1>
    <div id="gameWindow">
      <div id="move">
        <p>Make your move:</p>
      
        <div id="buttons">
          <button id="rockBtn"><img src="resources/rock.png" alt="" class="rockIcon">ROCK</button>
          <button id="paperBtn"><img src="resources/paper.png" alt="" class="paperIcon">PAPER</button>
          <button id="scissorsBtn"><img src="resources/scissors.png" alt="" class="scissorsIcon">SCISSORS</button>
        </div>
      </div>
    </div>
    <p id="credit">icons by <a href="https://icons8.com/license">icons8</a></p>
  </div>
</body>
</html>
